wire_api = "responses"

[model_providers.aigcdesk]
name = "AIGCDesk"
base_url = "https://api.aigcdesk.com/v1"
env_key = "AIGCDESK_API_KEY"
wire_api = "responses"

[model_providers.ofox]
name = "Ofox"
base_url = "https://api.ofox.ai/v1"
env_key = "OFOX_API_KEY"
wire_api = "responses"

[model_providers.deepseek]
name = "DeepSeek"
base_url = "https://api.deepseek.com/v1"
env_key = "DEEPSEEK_API_KEY"
wire_api = "responses"

[tui]
status_line = ["model-with-reasoning", "current-dir", "git-branch", "context-remaining", "five-hour-limit", "weekly-limit"]

[tui.model_availability_nux]
